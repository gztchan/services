[project]
name = "providence-data"
version = "0.1.0"
description = "Data API for Providence"
requires-python = ">=3.12,<3.13"
dependencies = [
    "faker>=40.15.0",
    "providence-database",
]

[dependency-groups]
dev = [
    "poethepoet>=0.41.0",
    "pytest>=7.0.0"
]

[tool.poetry.requires-plugins]
poethepoet = ">=0.41.0"

[tool.poe.tasks.test]
cmd = "pytest --log-cli-level=DEBUG -s"

[tool.setuptools.package-dir]
providence_data = "./src"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
